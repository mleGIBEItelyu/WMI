name: CI

# Runs the offline test suite and verifies the static site builds. No API key,
# no network — fast feedback that a change didn't break the pipeline or the site.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest -q
      - name: Verify the site builds from committed reports
        run: python build_site.py --out /tmp/site-check
